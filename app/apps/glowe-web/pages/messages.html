<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages - GloWe</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body class="opportunities-page-body">
    <header class="main-header">
        <div class="container">
            <a href="../index.html" class="logo">
                <span class="logo-icon"></span>
                <span class="logo-text">GloWe</span>
            </a>
            <nav class="main-nav"></nav>
            <div class="auth-buttons"></div>
            <div class="user-menu" style="display: none;"></div>
        </div>
    </header>

    <main>
        <section class="page-header personal-area-header">
            <div class="container">
                <h1>Messages</h1>
                <p>Direct conversations with volunteers, organizations, and partners.</p>
            </div>
        </section>

        <section class="personal-area-page">
            <div class="container">
                <div id="messages-content">
                    <!-- Populated by JavaScript -->
                </div>
            </div>
        </section>
    </main>

    <footer class="main-footer">
        <div class="container">
            <div class="footer-bottom">
                <p>2026 GloWe. Built for shared knowledge, mutual support, and action that lasts.</p>
            </div>
        </div>
    </footer>

    <!-- Success Modal -->
    <div id="success-modal" class="modal">
        <div class="modal-content modal-success">
            <span class="success-icon">GloWe</span>
            <h2 id="success-title">Success</h2>
            <p id="success-message">Your action was completed successfully.</p>
            <button class="btn btn-primary" onclick="closeModal('success-modal')">Continue</button>
        </div>
    </div>

    <script src="../js/backend-config.js"></script>
    <script src="../js/backend.js"></script>
    <script src="../js/data.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/app.js"></script>
</body>
</html>
