<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discussion Group - GloWe</title>
    <link rel="icon" type="image/png" href="../assets/glowe-favicon.png">
    <link rel="apple-touch-icon" sizes="180x180" href="../assets/apple-touch-icon.png">
    <link rel="apple-touch-icon" href="../assets/apple-touch-icon.png">
    <meta name="apple-mobile-web-app-title" content="GloWe">
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body class="community-page-body">
    <header class="main-header">
        <div class="container">
            <a href="../index.html" class="logo"><span class="logo-icon"></span><span class="logo-text">GloWe</span></a>
            <nav class="main-nav">
                <a href="../index.html" class="nav-link">Home</a>
                <a href="community.html" class="nav-link">Community</a>
                <a href="forums.html" class="nav-link active">Forums</a>
            </nav>
            <div class="auth-buttons">
                <button class="btn btn-outline" onclick="openModal('login-modal')">Log In</button>
                <button class="btn btn-primary" onclick="openModal('register-modal')">Join GloWe</button>
            </div>
        </div>
    </header>
    <main>
        <section class="page-header">
            <div class="container" id="discussion-group-header"></div>
        </section>
        <section class="community-layout discussion-layout">
            <div class="container">
                <aside class="community-sidebar">
                    <h3>Active Members</h3>
                    <div id="discussion-member-list"></div>
                    <h3>Group Actions</h3>
                    <a href="community.html">Back to Feed</a>
                    <a href="forums.html">All Groups</a>
                    <button class="btn btn-outline btn-small" type="button" onclick="showSuccessModal('Joined group', 'This group was added to your community spaces.')">Join Group</button>
                </aside>
                <section class="discussion-main">
                    <div id="discussion-composer" class="inline-composer active"></div>
                    <h2>Active Threads</h2>
                    <div id="discussion-thread-list" class="forum-thread-list"></div>
                </section>
            </div>
        </section>
    </main>
    <script src="../js/backend-config.js"></script>
    <script src="../js/backend.js"></script>
    <script src="../js/data.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/glowe-events.js"></script>
    <script src="../js/glowe-forums.js"></script>
    <script src="../js/glowe-wishes.js"></script>
    <script src="../js/glowe-moderation.js"></script>
    <script src="../js/glowe-create.js"></script>
    <script src="../js/glowe-messages.js"></script>
    <script src="../js/glowe-guest.js"></script>
    <script src="../js/glowe-localized-name.js"></script>
    <script src="../js/glowe-ui-conventions.js"></script>
    <script src="../js/glowe-version.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/glowe-translate.js"></script>
</body>
</html>
