# Fallow config (workspace root = app/). GloWe is a static multi-page site
# loaded via <script> tags from HTML, so declare the HTML shells as entries.
entry = [
  "apps/glowe-web/index.html",
  "apps/glowe-web/pages/**/*.html",
]

# FR-GLOWE-027 phase-1 packages intentionally mirror glowe-web oracles until
# the Expo app wires them; exclude from duplication gates (D-1 additive-only).
[duplicates]
ignore = [
  "packages/glowe-domain/**",
  "packages/glowe-application/**",
  "packages/glowe-infrastructure-supabase/**",
]
