# SonarCloud — KarmaCummunity/MVP-2
# Dashboard: https://sonarcloud.io/project/overview?id=KarmaCummunity_MVP-2
sonar.projectKey=KarmaCummunity_MVP-2
sonar.organization=karmacummunity

sonar.sources=app
sonar.tests=app
sonar.test.inclusions=**/__tests__/**,**/*.test.ts,**/*.test.tsx,**/*.test.mjs
sonar.exclusions=**/node_modules/**,**/.expo/**,**/dist/**,**/coverage/**,**/.turbo/**,**/build/**,**/public/**,**/database.types.ts,**/*.d.ts

# Monorepo TS — analysis rooted at app/
sonar.sourceEncoding=UTF-8

# Coverage — vitest writes lcov.info per package via `pnpm test:coverage`.
# Paths are repo-root relative; ci-sonar.yml runs coverage before the scan.
sonar.javascript.lcov.reportPaths=app/packages/domain/coverage/lcov.info,app/packages/application/coverage/lcov.info,app/packages/infrastructure-supabase/coverage/lcov.info,app/packages/ui/coverage/lcov.info,app/apps/mobile/coverage/lcov.info
sonar.typescript.lcov.reportPaths=app/packages/domain/coverage/lcov.info,app/packages/application/coverage/lcov.info,app/packages/infrastructure-supabase/coverage/lcov.info,app/packages/ui/coverage/lcov.info,app/apps/mobile/coverage/lcov.info
# Coverage scope: gate `packages/**` + `apps/mobile/src/{lib,hooks,store}/**`,
# where vitest already covers the testable code (≈1400 passing tests, TD-31).
# React Native screens/components/features stay excluded until TD-150 lands an
# RNTL/jest-expo harness (`@kc/mobile` has no UI test runner today). The mobile
# DI plumbing (`*Composition.ts`, `devAutoSignIn`) is structural wiring with no
# branches worth asserting.
sonar.coverage.exclusions=**/__tests__/**,**/*.test.ts,**/*.test.tsx,**/*.test.mjs,**/*.config.ts,**/*.config.js,**/*.config.mjs,**/database.types.ts,**/*.d.ts,**/index.ts,app/apps/mobile/src/i18n/locales/**,app/apps/mobile/app/**,app/apps/mobile/src/components/**,app/apps/mobile/src/features/**,app/apps/mobile/src/services/*Composition.ts,app/apps/mobile/src/services/devAutoSignIn.ts

# CI: block the workflow when the Quality Gate fails (new code on PRs).
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=600
