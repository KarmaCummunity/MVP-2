# CodeRabbit — AI PR review (non-merging). Install the GitHub App on
# KarmaCummunity/GloWe before this config takes effect.
# https://github.com/apps/coderabbitai

language: en-US
early_access: false
reviews:
  profile: chill
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  path_filters:
    - "app/apps/glowe-web/**"
    - "CONTRIBUTING.md"
    - "README.md"
    - "!.github/**"
    - "!**/*.lock"
    - "!**/coverage/**"
    - "!app/apps/mobile/**"
  auto_review:
    enabled: true
    drafts: false
