# Karma Community — Supabase project config
# See https://supabase.com/docs/reference/cli/config for the full reference.
# This file is committed; secrets (anon/service-role keys, project URL) live in .env / dashboard.

project_id = "karma-community"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[db.migrations]
schema_paths = ["./migrations"]

[studio]
enabled = true
port = 54323

[auth]
# Settings here are local-CLI only; the live project's auth config is managed in the dashboard.
enabled = true
site_url = "http://localhost:8081"
additional_redirect_urls = [
  "http://localhost:8081/auth/callback",
  "karmacommunity://auth/callback",
]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false
