name: CI — E2E dev

# P0 user journeys against the live Railway dev deployment (D-55).
# Gates production release PRs (dev → main). Requires DEV_WEB_URL + E2E secrets.

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'app/**'
      - 'tests/e2e/**'
      - 'scripts/wait-for-url.mjs'
      - 'scripts/ensure-e2e-user.mjs'
      - '.github/workflows/ci-e2e-dev.yml'
  workflow_dispatch:

concurrency:
  group: ci-e2e-dev-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  user-journeys:
    name: user journeys (P0)
    if: github.event_name != 'pull_request' || github.event.pull_request.draft != true
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - name: Require DEV_WEB_URL
        env:
          DEV_WEB_URL: ${{ vars.DEV_WEB_URL }}
        run: |
          set -euo pipefail
          if [ -z "${DEV_WEB_URL}" ]; then
            echo "::error::Repository variable DEV_WEB_URL is not set."
            echo "GitHub → Settings → Secrets and variables → Actions → Variables"
            echo "DEV_WEB_URL = https://mvp-2-dev.up.railway.app"
            exit 1
          fi
          echo "Target: ${DEV_WEB_URL}"

      - name: Wait for dev deployment
        env:
          DEV_WEB_URL: ${{ vars.DEV_WEB_URL }}
        run: node scripts/wait-for-url.mjs "${DEV_WEB_URL%/}/" 12 15000

      # The dev deploy may be GLOWE-only: web-postbuild.mjs then gates the KC web
      # app behind /glowe and gates the KC root behind a redirect to /glowe/ (see
      # app/scripts/web-postbuild.mjs, DECISIONS D-61). That redirect ships two
      # ways: a Cloudflare `_redirects` rule (`/ → /glowe/ 302`) AND a meta-refresh
      # index.html shim (`url=/glowe/`). In practice Cloudflare applies the 302
      # before serving the directory index, so the bare root returns an HTTP 302 —
      # the meta-refresh body is never served. When GLOWE-only, the KC P0 journeys
      # (which navigate to /, /chat, /create) cannot run — the root serves GloWe,
      # not the KC feed. Detect BOTH the 302 (follow redirects, inspect the
      # effective URL) and the legacy meta-refresh body, and skip the KC suite
      # cleanly instead of failing. Self-healing: when KC web is restored to the
      # dev root, "/" stops redirecting to /glowe/ and the journeys run again.
      - name: Detect whether dev serves the KC web app
        id: detect
        env:
          DEV_WEB_URL: ${{ vars.DEV_WEB_URL }}
        run: |
          set -euo pipefail
          # -L follows the _redirects 302 to /glowe/, so url_effective lands there;
          # the appended marker also captures a legacy meta-refresh body (url=/glowe/).
          resp="$(curl -fsSL "${DEV_WEB_URL%/}/" -w '\n__EFFECTIVE__%{url_effective}' 2>/dev/null || true)"
          if printf '%s' "$resp" | grep -qE 'url=/glowe/|__EFFECTIVE__.*/glowe/'; then
            echo "kc_web=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Dev is GLOWE-only (root redirects to /glowe/). Skipping KC P0 journeys until KC web returns to the dev root."
          else
            echo "kc_web=true" >> "$GITHUB_OUTPUT"
            echo "KC web is served at the dev root — running P0 journeys."
          fi

      - uses: actions/setup-node@v4
        if: steps.detect.outputs.kc_web == 'true'
        with:
          node-version-file: .nvmrc

      - name: Verify E2E credentials (Supabase auth API)
        if: steps.detect.outputs.kc_web == 'true'
        env:
          E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
          EXPO_PUBLIC_SUPABASE_URL: https://roeefqpdbftlndzsvhfj.supabase.co
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.E2E_SUPABASE_ANON_KEY_DEV }}
          E2E_SUPABASE_ANON_KEY: ${{ secrets.E2E_SUPABASE_ANON_KEY_DEV }}
        run: node scripts/ensure-e2e-user.mjs

      - name: Install Playwright
        if: steps.detect.outputs.kc_web == 'true'
        working-directory: tests/e2e
        run: |
          npm install
          npx playwright install --with-deps chromium

      - name: Run P0 journeys
        if: steps.detect.outputs.kc_web == 'true'
        working-directory: tests/e2e
        env:
          DEV_WEB_URL: ${{ vars.DEV_WEB_URL }}
          E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
          E2E_SUPABASE_ANON_KEY: ${{ secrets.E2E_SUPABASE_ANON_KEY_DEV }}
          EXPO_PUBLIC_SUPABASE_URL: https://roeefqpdbftlndzsvhfj.supabase.co
        run: npm test

      - uses: actions/upload-artifact@v4
        if: failure() && steps.detect.outputs.kc_web == 'true'
        with:
          name: playwright-report
          path: |
            tests/e2e/playwright-report/
            tests/e2e/test-results/
