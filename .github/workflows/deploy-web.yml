name: Deploy Web → Cloudflare Pages

on:
  push:
    branches: [main, dev]
    paths:
      - 'app/**'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy (${{ github.ref_name }})
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'cloudflare-prod' || 'cloudflare-dev' }}
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: app/package.json

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: app
        run: pnpm install --frozen-lockfile

      - name: Build web
        working-directory: app
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_ENVIRONMENT: ${{ secrets.EXPO_PUBLIC_ENVIRONMENT }}
        run: pnpm build:web

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >
            pages deploy app/apps/mobile/dist
            --project-name=karma-community
            --branch=${{ github.ref_name }}
