name: CI — migration drift

# Catches migration-ledger drift on the dev Supabase project: any version in
# `supabase_migrations.schema_migrations` that has no matching local migration
# file. The usual cause is a schema change applied via the Supabase MCP
# `apply_migration` tool (records a TIMESTAMP version, e.g. 20260701130827)
# instead of `supabase db push` from a committed sequential file (`NNNN_*.sql`).
# Such a version makes the next `DB deploy` run fail with "Remote migration
# versions not found in local migrations directory" until someone runs
# `supabase migration repair`. This guard surfaces the drift immediately.
#
# NOT a required status check (deliberately absent from the SSOT "Merge gates"
# tables): it needs live dev secrets and does not run on `pull_request`, so it
# never gates or hangs a PR. It fails loudly (red) on the schedule / on push to
# dev / on manual dispatch. Convention it enforces: docs/SSOT/OPERATOR_RUNBOOK.md
# → "Migration application rules" + CLAUDE.md §9.
#
# Scheduling note: GitHub runs `schedule` events only from the default branch
# (main). This workflow reaches main via the normal dev → main promotion; until
# then the push (to dev) and manual dispatch triggers provide coverage.

on:
  schedule:
    # Every 6 hours at :17 — MCP applies happen out-of-band (they touch no repo
    # path), so a push trigger alone would miss them; the cron is the safety net.
    - cron: '17 */6 * * *'
  workflow_dispatch: {}
  push:
    branches: [dev]
    paths:
      - 'supabase/migrations/**'
      - 'scripts/check-migration-drift.mjs'
      - '.github/workflows/ci-migration-drift.yml'

concurrency:
  group: ci-migration-drift-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  unit-tests:
    name: drift-guard unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - name: Run the guard's own unit tests
        run: node --test scripts/check-migration-drift.test.mjs

  drift-scan:
    name: dev ledger drift scan
    needs: unit-tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: supabase-dev
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          # Keep in sync with db-deploy.yml / ci-backend.yml — bump together.
          version: 2.99.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Preflight (non-empty secrets)
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ] || [ -z "${SUPABASE_DB_PASSWORD:-}" ] || [ -z "${SUPABASE_PROJECT_REF:-}" ]; then
            echo "::error::Missing Supabase secrets on the supabase-dev environment (SUPABASE_ACCESS_TOKEN / SUPABASE_DB_PASSWORD / SUPABASE_PROJECT_REF)."
            exit 1
          fi
          if [[ "$SUPABASE_ACCESS_TOKEN" != sbp_* ]]; then
            echo "::error::SUPABASE_ACCESS_TOKEN must be an account token (starts with sbp_). See https://supabase.com/dashboard/account/tokens"
            exit 1
          fi
          supabase --version

      - name: Link to dev project
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF" --yes

      - name: Scan the remote ledger for drift
        run: supabase migration list --linked --yes | node scripts/check-migration-drift.mjs
