name: CI — actionlint

# Meta-guard: validates .github/workflows/** itself. Only AI agents edit this
# repo, so nothing else reviews workflow changes — a malformed expression or
# unquoted shell variable would otherwise land silently and only explode
# post-merge. actionlint also runs shellcheck on every `run:` block.

on:
  pull_request:
    branches: [main, dev]
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - '.github/workflows/**'
  push:
    branches: [main, dev]
    paths:
      - '.github/workflows/**'

concurrency:
  group: ci-actionlint-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  actionlint:
    name: workflow lint
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Download actionlint
        # Pinned version; bump deliberately. Download script comes from the
        # same tag, so script and binary stay in sync.
        run: |
          bash <(curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/v1.7.7/scripts/download-actionlint.bash) 1.7.7
        shell: bash

      - name: Run actionlint (workflows + shellcheck on run blocks)
        run: ./actionlint -color
