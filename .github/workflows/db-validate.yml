name: DB validate

# Runs on every PR or push to main that touches DB-related files.
# Boots a fresh Supabase local stack, applies every migration + seed.sql,
# then runs every supabase/tests/*.sql to catch regressions (CHECKs, etc.)
# Mirrors what `supabase db push` would hit against prod —
# without touching prod.

on:
  pull_request:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - 'supabase/seed.sql'
      - 'supabase/tests/**'
      - 'supabase/config.toml'
      - '.github/workflows/db-validate.yml'
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - 'supabase/seed.sql'
      - 'supabase/tests/**'
      - 'supabase/config.toml'
      - '.github/workflows/db-validate.yml'

concurrency:
  group: db-validate-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: apply migrations on fresh local DB
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Install psql client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Start Supabase (applies all migrations + seed.sql)
        run: supabase start -x studio,inbucket,imgproxy,edge-runtime,realtime,storage-api

      - name: Run all DB tests (supabase/tests/*.sql)
        env:
          PGPASSWORD: postgres
        run: |
          set -euo pipefail
          shopt -s nullglob
          for f in supabase/tests/*.sql; do
            echo "── Running $f ──"
            psql -h 127.0.0.1 -p 54322 -U postgres -d postgres \
              -v ON_ERROR_STOP=1 \
              -f "$f"
          done

      - name: Stop Supabase
        if: always()
        run: supabase stop || true
