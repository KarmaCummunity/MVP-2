# Snyk — dependency vulnerability scan on PRs to dev/main.
# Requires repo/org secret SNYK_TOKEN (https://app.snyk.io/account).
# Non-blocking until baseline is clean; promote to required check in branch
# protection + ENVIRONMENTS.md when ready. See SECURITY.md § Quality tooling.

name: CI — Snyk

on:
  pull_request:
    branches: [main, dev]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

concurrency:
  group: ci-snyk-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  snyk:
    name: Snyk dependency scan
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Detect SNYK_TOKEN
        id: token
        run: |
          if [ -z "${{ secrets.SNYK_TOKEN }}" ]; then
            echo "::notice::SNYK_TOKEN not set — Snyk scan skipped. Add repo/org secret per SECURITY.md."
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup pnpm
        if: steps.token.outputs.configured == 'true'
        uses: pnpm/action-setup@v4
        with:
          package_json_file: app/package.json
          run_install: false

      - name: Setup Node.js
        if: steps.token.outputs.configured == 'true'
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml

      - name: Install dependencies
        if: steps.token.outputs.configured == 'true'
        working-directory: app
        run: pnpm install --frozen-lockfile

      - name: Snyk test (app monorepo)
        if: steps.token.outputs.configured == 'true'
        working-directory: app
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: pnpm dlx snyk@latest test --all-projects --severity-threshold=high
