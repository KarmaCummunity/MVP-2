name: Prod smoke

# Post-merge HTTP + GloWe functional probes after production deploy, plus
# scheduled synthetics (INFRA-QA-W7). Set PROD_WEB_URL in repo variables.
# Optional ingest: SUPABASE_SERVICE_ROLE_KEY (prod) + EXPO_PUBLIC_SUPABASE_URL.

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'Dockerfile'
      - 'supabase/migrations/**'
      - 'supabase/functions/**'
      - 'tests/e2e/**'
      - 'scripts/record-prod-health.mjs'
      - '.github/workflows/prod-smoke.yml'
      - '.github/workflows/db-deploy.yml'
  workflow_dispatch:
  schedule:
    - cron: '*/15 * * * *'

concurrency:
  group: prod-smoke-main
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  smoke:
    name: prod URL + GloWe health probes
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Require PROD_WEB_URL variable
        env:
          PROD_WEB_URL: ${{ vars.PROD_WEB_URL }}
        run: |
          set -euo pipefail
          if [ -z "${PROD_WEB_URL}" ]; then
            echo "::error::Repository variable PROD_WEB_URL is not set."
            echo "GitHub → Settings → Secrets and variables → Actions → Variables"
            echo "Add PROD_WEB_URL = https://karma-community-kc.com"
            exit 1
          fi
          echo "Target: ${PROD_WEB_URL}"

      - name: Wait for deploy window
        if: github.event_name == 'push'
        run: sleep 90

      - name: Poll prod URL (HTTP 200)
        env:
          PROD_WEB_URL: ${{ vars.PROD_WEB_URL }}
        run: |
          set -euo pipefail
          url="${PROD_WEB_URL%/}/"
          for attempt in $(seq 1 20); do
            code=$(curl -fsSL -o /tmp/prod-smoke-body.html -w "%{http_code}" "$url" || echo "000")
            if [ "$code" = "200" ]; then
              if grep -q '<html' /tmp/prod-smoke-body.html; then
                echo "OK — HTTP 200 with HTML body (attempt ${attempt})"
                exit 0
              fi
              echo "HTTP 200 but unexpected body (attempt ${attempt})"
            else
              echo "Attempt ${attempt}/20: HTTP ${code}"
            fi
            sleep 30
          done
          echo "::error::Prod URL did not return HTTP 200 within ~11 minutes."
          exit 1

      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install Playwright
        working-directory: tests/e2e
        run: |
          npm install
          npx playwright install --with-deps chromium

      - name: Resolve deployed app version
        id: version
        env:
          PROD_WEB_URL: ${{ vars.PROD_WEB_URL }}
        run: |
          set -euo pipefail
          ver="$(curl -fsSL "${PROD_WEB_URL%/}/glowe/js/glowe-version.js" | grep -oE "version: '[0-9]+\.[0-9]+\.[0-9]+'" | head -1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' || true)"
          echo "version=${ver}" >> "$GITHUB_OUTPUT"
          echo "Deployed GloWe version: ${ver:-unknown}"

      - name: Run GloWe prod-health probes
        working-directory: tests/e2e
        env:
          PROD_WEB_URL: ${{ vars.PROD_WEB_URL }}
          PLAYWRIGHT_JSON_OUTPUT_NAME: test-results/prod-health.json
        run: npx playwright test --project=prod-health --reporter=json,list

      - name: Ingest probe results (optional)
        if: always()
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ vars.EXPO_PUBLIC_SUPABASE_URL_PROD }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY_PROD }}
          GLOWE_APP_VERSION: ${{ steps.version.outputs.version }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          if [ -f tests/e2e/test-results/prod-health.json ]; then
            node scripts/record-prod-health.mjs tests/e2e/test-results/prod-health.json
          else
            echo "::warning::Playwright JSON report missing — skipping health ingest."
          fi

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: prod-health-report
          path: |
            tests/e2e/playwright-report/
            tests/e2e/test-results/
