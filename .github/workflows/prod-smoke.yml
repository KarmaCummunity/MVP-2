name: Prod smoke

# KC production HTTP check after `main` deploy (karma-community-kc.com).
# GloWe live-site probes live in glowe-prod-smoke.yml (separate product prod).

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'Dockerfile'
      - 'supabase/migrations/**'
      - 'supabase/functions/**'
      - '.github/workflows/prod-smoke.yml'
      - '.github/workflows/db-deploy.yml'
  workflow_dispatch:

concurrency:
  group: prod-smoke-main
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  kc-smoke:
    name: KC prod URL health check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Require KC_PROD_URL (or legacy PROD_WEB_URL)
        env:
          KC_PROD_URL: ${{ vars.KC_PROD_URL }}
          PROD_WEB_URL: ${{ vars.PROD_WEB_URL }}
        run: |
          set -euo pipefail
          target="${KC_PROD_URL:-${PROD_WEB_URL:-}}"
          if [ -z "$target" ]; then
            echo "::error::Set KC_PROD_URL (preferred) or PROD_WEB_URL to the KC production root."
            echo "Example: KC_PROD_URL = https://karma-community-kc.com"
            exit 1
          fi
          echo "KC prod target: $target"

      - name: Wait for deploy window
        if: github.event_name == 'push'
        run: sleep 90

      - name: Poll KC prod URL (HTTP 200)
        env:
          KC_PROD_URL: ${{ vars.KC_PROD_URL }}
          PROD_WEB_URL: ${{ vars.PROD_WEB_URL }}
        run: |
          set -euo pipefail
          url="${KC_PROD_URL:-${PROD_WEB_URL}}"
          url="${url%/}/"
          for attempt in $(seq 1 20); do
            code=$(curl -fsSL -o /tmp/kc-prod-smoke-body.html -w "%{http_code}" "$url" || echo "000")
            if [ "$code" = "200" ]; then
              if grep -q '<html' /tmp/kc-prod-smoke-body.html; then
                echo "OK — HTTP 200 with HTML body (attempt ${attempt})"
                exit 0
              fi
              echo "HTTP 200 but unexpected body (attempt ${attempt})"
            else
              echo "Attempt ${attempt}/20: HTTP ${code}"
            fi
            sleep 30
          done
          echo "::error::KC prod URL did not return HTTP 200 within ~11 minutes."
          exit 1
