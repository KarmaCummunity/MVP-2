name: CI — frontend

# `typecheck · test · lint` and `Hebrew source scan (no inline UI copy)` are
# REQUIRED status checks on dev/main (branch protection) — keep the job names
# stable. Because they are required, the pull_request trigger MUST run on every
# non-draft PR (no path filter): path-filtering left those required contexts
# permanently "Expected" on backend-only / docs-only PRs and blocked their merge
# (same root cause and fix as ci-backend.yml / ci-contract.yml). A cheap
# `changes` job gates the heavy `quality` + `web export` steps so a non-frontend
# PR gets a fast pass while still reporting the required contexts. `push` stays
# path-filtered. Keep the `changes` filter list in sync with the real inputs.

on:
  pull_request:
    branches: [main, dev]
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main, dev]
    paths:
      - 'app/**'
      - 'Dockerfile'
      - 'scripts/extract-hebrew-text.mjs'
      - 'scripts/smoke-web-bundle.mjs'
      - '.github/workflows/ci-frontend.yml'

concurrency:
  group: ci-frontend-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    name: detect frontend changes
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 3
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Detect frontend-relevant changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'app/**'
              - 'Dockerfile'
              - 'scripts/extract-hebrew-text.mjs'
              - 'scripts/smoke-web-bundle.mjs'
              - '.github/workflows/ci-frontend.yml'

  quality:
    # REQUIRED status check — always runs so the context reports on every PR.
    # Heavy steps are gated on `needs.changes.outputs.frontend == 'true'`; a
    # non-frontend PR runs only the skip-notice step and concludes success.
    name: typecheck · test · lint
    needs: changes
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: No frontend changes — typecheck/test/lint not required
        if: needs.changes.outputs.frontend != 'true'
        run: echo "No app/** or build-input changes in this PR — skipping typecheck/test/lint."

      - name: Setup pnpm
        if: needs.changes.outputs.frontend == 'true'
        uses: pnpm/action-setup@v4
        with:
          package_json_file: app/package.json
          run_install: false

      - name: Setup Node.js
        if: needs.changes.outputs.frontend == 'true'
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml

      - name: Install dependencies
        if: needs.changes.outputs.frontend == 'true'
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        if: needs.changes.outputs.frontend == 'true'
        run: pnpm typecheck

      - name: Test
        if: needs.changes.outputs.frontend == 'true'
        run: pnpm test:coverage

      - name: Upload coverage artifacts
        if: always() && needs.changes.outputs.frontend == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ github.run_id }}
          path: |
            app/packages/domain/coverage/
            app/packages/application/coverage/
            app/packages/infrastructure-supabase/coverage/
            app/packages/ui/coverage/
            app/apps/mobile/coverage/
          retention-days: 14

      - name: Lint
        if: needs.changes.outputs.frontend == 'true'
        run: pnpm lint

      - name: Dependency audit
        if: needs.changes.outputs.frontend == 'true'
        run: pnpm audit --audit-level=high

  web-build:
    name: web export (production bundle)
    # REQUIRED status check on `main` (dev→main promotion PRs). Must always
    # report so the context isn't stuck "Expected" on a promotion whose tree
    # already matches `main` under app/** (e.g. a pure infra/migration fix) —
    # same failure mode and fix as the `quality` job above. Heavy steps
    # (build + Playwright smoke) are gated on frontend changes; a non-frontend
    # PR runs only the skip-notice step and concludes success.
    needs: changes
    if: github.event.pull_request.draft != true
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: app

    env:
      EXPO_PUBLIC_ENVIRONMENT: production
      EXPO_PUBLIC_SUPABASE_URL: https://roeefqpdbftlndzsvhfj.supabase.co
      EXPO_PUBLIC_SUPABASE_ANON_KEY: ci-web-build-placeholder-not-for-runtime
      # Pinned so the smoke step is deterministic; browser binaries are cached
      # under this key. Bump deliberately (cache key rolls with it).
      PLAYWRIGHT_VERSION: 1.60.0

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: No frontend changes — web export not required
        if: needs.changes.outputs.frontend != 'true'
        run: echo "No app/** or build-input changes in this PR — skipping web export."

      - name: Setup pnpm
        if: needs.changes.outputs.frontend == 'true'
        uses: pnpm/action-setup@v4
        with:
          package_json_file: app/package.json
          run_install: false

      - name: Setup Node.js
        if: needs.changes.outputs.frontend == 'true'
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml

      - name: Install dependencies
        if: needs.changes.outputs.frontend == 'true'
        run: pnpm install --frozen-lockfile

      - name: Build web bundle (same env wiring as Dockerfile)
        if: needs.changes.outputs.frontend == 'true'
        run: pnpm build:web

      - name: Verify dist output
        if: needs.changes.outputs.frontend == 'true'
        run: test -f apps/mobile/dist/index.html

      - name: Cache Playwright browsers
        if: needs.changes.outputs.frontend == 'true'
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ env.PLAYWRIGHT_VERSION }}

      - name: Install Playwright (Chromium only)
        if: needs.changes.outputs.frontend == 'true'
        working-directory: ${{ github.workspace }}
        run: |
          npm init -y --silent
          npm install --no-save --silent "playwright@${PLAYWRIGHT_VERSION}"
          if [ "${{ steps.playwright-cache.outputs.cache-hit }}" = "true" ]; then
            # Browser binaries restored from cache — only OS deps needed.
            npx playwright install-deps chromium
          else
            npx playwright install --with-deps chromium
          fi

      - name: Smoke-load web bundle (headless Chromium)
        if: needs.changes.outputs.frontend == 'true'
        working-directory: ${{ github.workspace }}
        run: node scripts/smoke-web-bundle.mjs --dist app/apps/mobile/dist

  hebrew-source-scan:
    # REQUIRED status check. Cheap (scans the whole repo regardless of which
    # files changed), so it runs unconditionally on every non-draft PR.
    name: Hebrew source scan (no inline UI copy)
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Scan for Hebrew outside allowed paths
        run: node scripts/extract-hebrew-text.mjs --check

      - name: Run Hebrew scanner guard unit tests
        run: node --test scripts/extract-hebrew-text.test.mjs
