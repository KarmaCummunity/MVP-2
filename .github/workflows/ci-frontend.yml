name: CI — frontend

# Runs on PRs and pushes to `main` / `dev` whose changes touch the app code
# or its build inputs. Mirrors the quality + web build + Hebrew scan gates.
#
# `typecheck · test · lint` and `Hebrew source scan (no inline UI copy)` are
# REQUIRED status checks on dev/main (branch protection) — keep the job names
# stable, or branch protection will block every PR waiting on a context that
# can no longer report.

on:
  pull_request:
    branches: [main, dev]
    paths:
      - 'app/**'
      - 'Dockerfile'
      - 'scripts/extract-hebrew-text.mjs'
      - 'scripts/smoke-web-bundle.mjs'
      - '.github/workflows/ci-frontend.yml'
  push:
    branches: [main, dev]
    paths:
      - 'app/**'
      - 'Dockerfile'
      - 'scripts/extract-hebrew-text.mjs'
      - 'scripts/smoke-web-bundle.mjs'
      - '.github/workflows/ci-frontend.yml'

concurrency:
  group: ci-frontend-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  quality:
    name: typecheck · test · lint
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test:coverage

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ github.run_id }}
          path: |
            app/packages/domain/coverage/
            app/packages/application/coverage/
            app/packages/infrastructure-supabase/coverage/
            app/packages/ui/coverage/
            app/apps/mobile/coverage/
          retention-days: 14

      - name: Lint
        run: pnpm lint

      - name: Dependency audit
        run: pnpm audit --audit-level=high

  web-build:
    name: web export (production bundle)
    # Runs on every non-draft PR/push to main or dev. Builds the production
    # web bundle and then headless-smokes it — catches the class of bug that
    # crashes /research and similar routes at runtime (route enumeration,
    # missing modules, top-level exceptions) that typecheck/test/lint miss.
    if: github.event.pull_request.draft != true
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: app

    env:
      EXPO_PUBLIC_ENVIRONMENT: production
      EXPO_PUBLIC_SUPABASE_URL: https://roeefqpdbftlndzsvhfj.supabase.co
      EXPO_PUBLIC_SUPABASE_ANON_KEY: ci-web-build-placeholder-not-for-runtime

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web bundle (same env wiring as Dockerfile)
        run: pnpm build:web

      - name: Verify dist output
        run: test -f apps/mobile/dist/index.html

      - name: Install Playwright (Chromium only)
        working-directory: ${{ github.workspace }}
        run: |
          npm init -y --silent
          npm install --no-save --silent playwright
          npx playwright install --with-deps chromium

      - name: Smoke-load web bundle (headless Chromium)
        working-directory: ${{ github.workspace }}
        run: node scripts/smoke-web-bundle.mjs --dist app/apps/mobile/dist

  hebrew-source-scan:
    name: Hebrew source scan (no inline UI copy)
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Scan for Hebrew outside allowed paths
        run: node scripts/extract-hebrew-text.mjs --check
