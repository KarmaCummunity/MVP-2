name: CI — backend

# Backend correctness gate. Runs static migration chain lint first (cheap),
# then boots a fresh Supabase local stack and runs all DB tests (incl.
# rls-lint.sql), the database.types.ts drift check, and the SECURITY DEFINER
# SQL probe integration tests. Replaces the old `db-validate.yml`.

on:
  pull_request:
    branches: [main, dev]
    paths:
      - 'supabase/**'
      - 'scripts/check-migration-chain.mjs'
      - 'app/packages/infrastructure-supabase/src/database.types.ts'
      - 'app/packages/infrastructure-supabase/src/rpc/__tests__/sqlProbes.integration.test.ts'
      - '.github/workflows/ci-backend.yml'
  push:
    branches: [main, dev]
    paths:
      - 'supabase/**'
      - 'scripts/check-migration-chain.mjs'
      - 'app/packages/infrastructure-supabase/src/database.types.ts'
      - 'app/packages/infrastructure-supabase/src/rpc/__tests__/sqlProbes.integration.test.ts'
      - '.github/workflows/ci-backend.yml'

concurrency:
  group: ci-backend-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  migration-chain:
    name: migration chain lint
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Verify Alembic-style single-head migration chain
        run: node scripts/check-migration-chain.mjs

  db-validate:
    name: apply migrations · rls · types · sql probes
    needs: migration-chain
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          # Keep in sync with db-deploy.yml — bump both in the same PR.
          version: 2.99.0

      - name: Print Supabase CLI version
        run: supabase --version

      - name: Install psql client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Start Supabase (applies all migrations + seed.sql)
        run: supabase start -x studio,inbucket,imgproxy,edge-runtime,realtime,storage-api

      - name: Run all DB tests (supabase/tests/*.sql)
        env:
          PGPASSWORD: postgres
        run: |
          set -euo pipefail
          shopt -s nullglob
          for f in supabase/tests/*.sql; do
            echo "── Running $f ──"
            psql -h 127.0.0.1 -p 54322 -U postgres -d postgres \
              -v ON_ERROR_STOP=1 \
              -f "$f"
          done

      - name: Check database.types.ts drift
        run: |
          set -euo pipefail
          supabase gen types typescript --local > /tmp/database.types.ts
          if ! diff -u app/packages/infrastructure-supabase/src/database.types.ts /tmp/database.types.ts; then
            echo "::error::database.types.ts is out of date. Run: supabase gen types typescript --local > app/packages/infrastructure-supabase/src/database.types.ts"
            exit 1
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: app
        run: pnpm install --frozen-lockfile

      - name: SQL probe integration tests (against local stack)
        working-directory: app
        env:
          CI_LOCAL_SUPABASE: 'true'
        run: pnpm --filter @kc/infrastructure-supabase test sqlProbes

      - name: Stop Supabase
        if: always()
        run: supabase stop || true
