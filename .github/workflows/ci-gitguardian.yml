# GitGuardian ggshield — secret leak scan on PR diffs.
# Requires repo/org secret GITGUARDIAN_API_KEY (GitGuardian dashboard → API).
# Non-blocking until baseline is clean; promote to required when ready.
# Complements GitHub Secret Scanning (push-time). See SECURITY.md § Quality tooling.

name: CI — GitGuardian

on:
  pull_request:
    branches: [main, dev]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

concurrency:
  group: ci-gitguardian-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gitguardian:
    name: GitGuardian secret scan
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect GITGUARDIAN_API_KEY
        id: token
        run: |
          if [ -z "${{ secrets.GITGUARDIAN_API_KEY }}" ]; then
            echo "::notice::GITGUARDIAN_API_KEY not set — GitGuardian scan skipped. See SECURITY.md."
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: GitGuardian scan
        if: steps.token.outputs.configured == 'true'
        uses: GitGuardian/ggshield-action@v1.31.0
        continue-on-error: true
        env:
          GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}
          GITHUB_PULL_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          GITHUB_DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
