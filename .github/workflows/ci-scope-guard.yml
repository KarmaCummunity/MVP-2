# Closes PRs that only change the paused KC mobile frontend.
# Mixed PRs (mobile + other paths) get a warning comment but stay open.
name: CI — scope guard

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: scope-guard-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  kc-mobile-scope:
    name: KC mobile scope
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Classify changed paths
        id: scope
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          mapfile -t files < <(git diff --name-only "$BASE_SHA...$HEAD_SHA" || true)
          if [[ ${#files[@]} -eq 0 ]]; then
            echo "mobile_only=false" >> "$GITHUB_OUTPUT"
            echo "touches_mobile=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          touches_mobile=false
          touches_other=false
          for f in "${files[@]}"; do
            if [[ "$f" == app/apps/mobile/* ]]; then
              touches_mobile=true
            else
              touches_other=true
            fi
          done
          mobile_only=false
          if [[ "$touches_mobile" == true && "$touches_other" == false ]]; then
            mobile_only=true
          fi
          echo "touches_mobile=$touches_mobile" >> "$GITHUB_OUTPUT"
          echo "mobile_only=$mobile_only" >> "$GITHUB_OUTPUT"
          echo "Changed files (${#files[@]}):"
          printf ' - %s\n' "${files[@]}"

      - name: Close mobile-only PR
        if: steps.scope.outputs.mobile_only == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const body = [
              '## Out of scope — KC mobile frontend is paused',
              '',
              'This pull request only changes `app/apps/mobile/**`.',
              'Active product work targets **GLOWE** (`app/apps/glowe-web/`).',
              '',
              'Please see:',
              '- [`AGENTS.md`](../blob/dev/AGENTS.md) — standing product focus',
              '- [`CONTRIBUTING.md`](../blob/dev/CONTRIBUTING.md) — contributor scope',
              '',
              'Open a new PR against **`dev`** that changes GLOWE (or shared backend',
              'with clear GLOWE justification). Closing this PR automatically.',
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              state: 'closed',
            });
            core.setFailed('PR closed: KC mobile-only changes are out of scope.');

      - name: Warn on mixed mobile + other paths
        if: steps.scope.outputs.touches_mobile == 'true' && steps.scope.outputs.mobile_only != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- kc-mobile-scope-warning -->';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            if (comments.some((c) => c.body && c.body.includes(marker))) {
              return;
            }
            const body = [
              marker,
              '## Scope note — KC mobile paths included',
              '',
              'This PR touches `app/apps/mobile/**` **and** other paths.',
              'KC mobile UI work is paused; please split mobile-only changes out',
              'or drop them unless they are strictly required for a GLOWE/shared',
              'backend change.',
              '',
              'See [`AGENTS.md`](../blob/dev/AGENTS.md) and [`CONTRIBUTING.md`](../blob/dev/CONTRIBUTING.md).',
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
