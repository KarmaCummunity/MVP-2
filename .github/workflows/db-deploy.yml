name: DB deploy

# Trigger modes:
#   1. Manual (workflow_dispatch): targets either supabase-prod or supabase-dev,
#      defaults to dry-run (use for ad-hoc inspection or emergency applies).
#   2. Auto on push to `dev` or `main` when migration-related paths change:
#      `dev` → supabase-dev; `main` → supabase-prod (dry-run, then apply).
#      DB validate (fresh local stack) must stay green on PRs before merge.
#
# Required secrets on the selected GitHub Environment (supabase-prod / supabase-dev):
#   - SUPABASE_ACCESS_TOKEN    **Account** access token only: https://supabase.com/dashboard/account/tokens
#                              Must look like `sbp_…` (classic PAT). NOT `sb_publishable_…` (anon) or service_role JWT.
#   - SUPABASE_DB_PASSWORD     The remote DB password (project settings → Database).
#   - SUPABASE_PROJECT_REF     The remote project ref (dashboard URL — NOT config.toml project_id).
#
# CI troubleshooting: if `db push` exits 1 with no clear error, add `--yes` (non-interactive prompts).
# Ensure each environment has its own three secrets (no trailing newline in SUPABASE_PROJECT_REF).

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'GitHub Environment that holds Supabase secrets for this push'
        type: choice
        options:
          - supabase-prod
          - supabase-dev
        default: supabase-prod
      apply:
        description: 'Apply pending migrations to remote (uncheck = dry-run / list only).'
        type: boolean
        default: false
  push:
    branches: [dev, main]
    paths:
      - 'supabase/migrations/**'
      - 'supabase/seed.sql'
      - 'supabase/config.toml'
      - '.github/workflows/db-deploy.yml'

concurrency:
  group: db-deploy-${{ github.event_name == 'workflow_dispatch' && inputs.target || (github.ref_name == 'main' && 'supabase-prod' || 'supabase-dev') }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: ${{ github.event_name == 'push' && format('apply · {0} (push)', github.ref_name == 'main' && 'supabase-prod' || 'supabase-dev') || (inputs.apply && format('apply · {0}', inputs.target) || format('dry-run · {0}', inputs.target)) }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment:
      name: ${{ github.event_name == 'workflow_dispatch' && inputs.target || (github.ref_name == 'main' && 'supabase-prod' || 'supabase-dev') }}

    env:
      DEPLOY_ENV: ${{ github.event_name == 'workflow_dispatch' && inputs.target || (github.ref_name == 'main' && 'supabase-prod' || 'supabase-dev') }}
      IS_PROD_TARGET: ${{ (github.event_name == 'workflow_dispatch' && inputs.target == 'supabase-prod') || (github.event_name == 'push' && github.ref_name == 'main') }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          # Pinned for deterministic CI. Bump intentionally with a separate PR
          # that re-runs DB validate/deploy against the new version.
          version: 2.99.0

      - name: Preflight (config + non-empty secrets)
        run: |
          set -euo pipefail
          test -f supabase/config.toml
          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN is empty. Add it to GitHub → Settings → Environments → ${{ env.DEPLOY_ENV }} (not only repository secrets)."
            exit 1
          fi
          case "$SUPABASE_ACCESS_TOKEN" in
            sb_publishable_*|sb_secret_*|eyJ*)
              echo "::error::SUPABASE_ACCESS_TOKEN is a project API key (anon/service_role style). The CLI needs an **account** token from https://supabase.com/dashboard/account/tokens — value must start with sbp_."
              exit 1
              ;;
          esac
          if [[ "$SUPABASE_ACCESS_TOKEN" != sbp_* ]]; then
            echo "::error::SUPABASE_ACCESS_TOKEN must start with sbp_ (Supabase account access token). Generate at https://supabase.com/dashboard/account/tokens"
            exit 1
          fi
          if [ -z "${SUPABASE_DB_PASSWORD:-}" ]; then
            echo "::error::SUPABASE_DB_PASSWORD is empty. Use the Database password from Supabase → Project Settings → Database."
            exit 1
          fi
          if [ -z "${SUPABASE_PROJECT_REF:-}" ]; then
            echo "::error::SUPABASE_PROJECT_REF is empty. Paste the ref from the dashboard URL (e.g. slxi…zx) with no quotes or trailing newline."
            exit 1
          fi
          echo "SUPABASE_PROJECT_REF length=${#SUPABASE_PROJECT_REF}"
          supabase --version

      - name: Link to remote project
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF" --yes

      - name: List pending migrations
        run: supabase migration list --linked --yes

      - name: Dry-run push (prod targets before apply)
        if: >-
          env.IS_PROD_TARGET == 'true' && (
            github.event_name == 'push' ||
            (github.event_name == 'workflow_dispatch' && inputs.apply)
          )
        run: supabase db push --dry-run --include-all --linked --yes

      - name: Push migrations to remote
        if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.apply) }}
        run: supabase db push --include-all --linked --yes
