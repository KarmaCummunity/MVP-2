name: DB deploy

# Manually triggered (Actions → DB deploy → Run workflow). Replaces the local
# `supabase db push --include-all` dance. Defaults to dry-run; flip the
# `apply` input to true to actually push.
#
# Required secrets on the selected GitHub Environment (supabase-prod / supabase-dev):
#   - SUPABASE_ACCESS_TOKEN    Personal access token (Supabase dashboard → Account → Access tokens).
#   - SUPABASE_DB_PASSWORD     The remote DB password (project settings → Database).
#   - SUPABASE_PROJECT_REF     The remote project ref (dashboard URL — NOT config.toml project_id).
#
# CI troubleshooting: if `db push` exits 1 with no clear error, add `--yes` (non-interactive prompts).
# Ensure each environment has its own three secrets (no trailing newline in SUPABASE_PROJECT_REF).

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'GitHub Environment that holds Supabase secrets for this push'
        type: choice
        options:
          - supabase-prod
          - supabase-dev
        default: supabase-prod
      apply:
        description: 'Apply pending migrations to remote (uncheck = dry-run / list only).'
        type: boolean
        default: false

concurrency:
  group: db-deploy-${{ inputs.target }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: ${{ inputs.apply && format('apply · {0}', inputs.target) || format('dry-run · {0}', inputs.target) }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment:
      name: ${{ inputs.target }}

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Preflight (config + non-empty secrets)
        run: |
          set -euo pipefail
          test -f supabase/config.toml
          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN is empty. Add it to GitHub → Settings → Environments → ${{ inputs.target }} (not only repository secrets)."
            exit 1
          fi
          if [ -z "${SUPABASE_DB_PASSWORD:-}" ]; then
            echo "::error::SUPABASE_DB_PASSWORD is empty. Use the Database password from Supabase → Project Settings → Database."
            exit 1
          fi
          if [ -z "${SUPABASE_PROJECT_REF:-}" ]; then
            echo "::error::SUPABASE_PROJECT_REF is empty. Paste the ref from the dashboard URL (e.g. slxi…zx) with no quotes or trailing newline."
            exit 1
          fi
          echo "SUPABASE_PROJECT_REF length=${#SUPABASE_PROJECT_REF}"
          supabase --version

      - name: Link to remote project
        run: supabase link --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}" --yes

      - name: List pending migrations
        run: supabase migration list --linked --yes

      - name: Push migrations to remote
        if: ${{ inputs.apply }}
        run: supabase db push --include-all --linked --yes
