name: Bump app version

# Org policy blocks GitHub Actions from creating PRs (409 / GraphQL createPullRequest).
# This workflow therefore only prepares a bump branch; agents (or a human) open the PR.
# Preferred path: agents bump app/VERSION + glowe-version.js in every PR to `dev`
# (see CLAUDE.md APP VERSION banner). workflow_dispatch remains for a prepared branch.

on:
  workflow_dispatch:

concurrency:
  group: bump-app-version-dev
  cancel-in-progress: false

jobs:
  bump:
    name: Prepare version bump branch
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Bump patch + push branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          out="$(node scripts/bump-app-version.mjs)"
          echo "$out"
          VERSION="$(cut -d' ' -f3 <<<"$out")"
          BRANCH="chore/version-bump-${VERSION}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/VERSION app/apps/glowe-web/js/glowe-version.js
          if git diff --cached --quiet; then
            echo "No version changes"
            exit 0
          fi
          git switch -c "$BRANCH"
          git commit -m "chore(version): bump to ${VERSION}"
          git push -u origin HEAD
          echo "::notice::Pushed ${BRANCH}. Open a PR to dev (Actions cannot create PRs under org policy)."
          echo "Branch: https://github.com/${{ github.repository }}/pull/new/${BRANCH}"
