name: Bump app version

# Auto-increment app/VERSION patch on every push to `dev` (FR-GLOWE-025 / D-181).
# Commits with `[skip version]` so this workflow does not re-trigger itself.

on:
  push:
    branches: [dev]

concurrency:
  group: bump-app-version-dev
  cancel-in-progress: false

jobs:
  bump:
    name: Bump patch (dev)
    if: ${{ !contains(github.event.head_commit.message, '[skip version]') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Bump patch + sync glowe-version.js
        id: bump
        run: |
          out="$(node scripts/bump-app-version.mjs)"
          echo "$out"
          echo "summary=$out" >> "$GITHUB_OUTPUT"
          echo "version=$(cut -d' ' -f3 <<<"$out")" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/VERSION app/apps/glowe-web/js/glowe-version.js
          if git diff --cached --quiet; then
            echo "No version changes to commit"
            exit 0
          fi
          git commit -m "chore(version): bump to ${{ steps.bump.outputs.version }} [skip version]"
          git pull --rebase origin dev
          git push origin HEAD:dev
