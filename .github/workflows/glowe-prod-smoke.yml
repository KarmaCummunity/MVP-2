name: GloWe prod smoke

# GloWe live-site synthetics (INFRA-QA-W7). GloWe production is NOT the same
# deploy as KC production:
#   GLOWE_PROD_URL → https://dev.karma-community.pages.dev/glowe  (`dev` branch)
#   KC_PROD_URL    → https://karma-community-kc.com               (`main` branch)
#
# Health rows ingest into the Supabase **dev** project (GloWe's backend today).

on:
  push:
    branches: [dev]
    paths:
      - 'app/apps/glowe-web/**'
      - 'app/VERSION'
      - 'app/scripts/web-postbuild.mjs'
      - 'supabase/migrations/**'
      - 'tests/e2e/**'
      - 'scripts/record-prod-health.mjs'
      - '.github/workflows/glowe-prod-smoke.yml'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch:
  schedule:
    - cron: '*/15 * * * *'

concurrency:
  group: glowe-prod-smoke
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  glowe-health:
    name: GloWe live-site health probes
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: supabase-dev

    steps:
      - name: Require GLOWE_PROD_URL
        env:
          GLOWE_PROD_URL: ${{ vars.GLOWE_PROD_URL }}
        run: |
          set -euo pipefail
          if [ -z "${GLOWE_PROD_URL}" ]; then
            echo "::error::Repository variable GLOWE_PROD_URL is not set."
            echo "Set GLOWE_PROD_URL = https://dev.karma-community.pages.dev/glowe"
            exit 1
          fi
          echo "GloWe prod target: ${GLOWE_PROD_URL}"

      - name: Wait for deploy window
        if: github.event_name == 'push'
        run: sleep 90

      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install Playwright
        working-directory: tests/e2e
        run: |
          npm install
          npx playwright install --with-deps chromium

      - name: Resolve deployed GloWe version
        id: version
        env:
          GLOWE_PROD_URL: ${{ vars.GLOWE_PROD_URL }}
        run: |
          set -euo pipefail
          base="${GLOWE_PROD_URL%/}"
          ver="$(curl -fsSL "${base}/js/glowe-version.js" | grep -oE "version: '[0-9]+\.[0-9]+\.[0-9]+'" | head -1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' || true)"
          echo "version=${ver}" >> "$GITHUB_OUTPUT"
          echo "Deployed GloWe version: ${ver:-unknown}"

      - name: Run GloWe prod-health probes
        working-directory: tests/e2e
        env:
          GLOWE_PROD_URL: ${{ vars.GLOWE_PROD_URL }}
          PLAYWRIGHT_JSON_OUTPUT_NAME: test-results/prod-health.json
        run: npx playwright test --project=prod-health --reporter=json,list

      - name: Refuse KC production Supabase ref for ingest
        env:
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          set -euo pipefail
          if [ "$SUPABASE_PROJECT_REF" = "slxijdfvinbjmrsfgbzx" ]; then
            echo "::error::Health ingest must target the GloWe dev Supabase project, not KC prod."
            exit 1
          fi

      - name: Fetch dev service-role key (Management API)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          set -euo pipefail
          keys=$(curl -fsS "https://api.supabase.com/v1/projects/${SUPABASE_PROJECT_REF}/api-keys?reveal=true" \
            -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}")
          service_key=$(echo "$keys" | node -e '
            const chunks=[];process.stdin.on("data",c=>chunks.push(c)).on("end",()=>{
              const keys=JSON.parse(Buffer.concat(chunks).toString());
              const k=keys.find(k=>k.name==="service_role"||k.id==="service_role"||k.type==="secret");
              if(!k||!k.api_key){console.error("service role key not found");process.exit(1);}
              console.log(k.api_key);
            });')
          echo "::add-mask::$service_key"
          echo "SUPABASE_SERVICE_ROLE_KEY=$service_key" >> "$GITHUB_ENV"

      - name: Ingest probe results
        if: always()
        env:
          EXPO_PUBLIC_SUPABASE_URL: https://${{ secrets.SUPABASE_PROJECT_REF }}.supabase.co
          GLOWE_APP_VERSION: ${{ steps.version.outputs.version }}
          GLOWE_HEALTH_ENV: glowe_prod
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          if [ -f tests/e2e/test-results/prod-health.json ]; then
            node scripts/record-prod-health.mjs tests/e2e/test-results/prod-health.json
          else
            echo "::warning::Playwright JSON report missing — skipping health ingest."
          fi

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: glowe-prod-health-report
          path: |
            tests/e2e/playwright-report/
            tests/e2e/test-results/
