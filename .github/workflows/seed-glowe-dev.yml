name: Seed GloWe dev data

# Seeds the Supabase DEV project with realistic GloWe demo/test data
# (scripts/seed-glowe-dev.mjs). Idempotent — safe to re-run; re-running
# refreshes the dataset and resets the pending-org review fixture.
#
# DEV ONLY: hard-guarded against the production project ref both here and
# inside the script. Uses the supabase-dev GitHub Environment secrets; the
# service-role key is fetched at runtime from the Supabase Management API and
# never stored.

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type SEED-DEV to confirm seeding the dev database'
        required: true

permissions:
  contents: read

concurrency:
  group: seed-glowe-dev
  cancel-in-progress: false

jobs:
  seed:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: supabase-dev
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
    steps:
      - name: Require confirmation phrase
        run: |
          set -euo pipefail
          if [ "${{ inputs.confirm }}" != "SEED-DEV" ]; then
            echo "::error::Confirmation phrase mismatch — type SEED-DEV to run the seed."
            exit 1
          fi

      - name: Refuse production ref
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_PROJECT_REF:-}" ]; then
            echo "::error::SUPABASE_PROJECT_REF secret is empty on the supabase-dev environment."
            exit 1
          fi
          if [ "$SUPABASE_PROJECT_REF" = "slxijdfvinbjmrsfgbzx" ]; then
            echo "::error::This workflow must never target the production project."
            exit 1
          fi

      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Fetch dev service-role key (Management API)
        run: |
          set -euo pipefail
          keys=$(curl -fsS "https://api.supabase.com/v1/projects/${SUPABASE_PROJECT_REF}/api-keys?reveal=true" \
            -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}")
          service_key=$(echo "$keys" | node -e '
            const chunks=[];process.stdin.on("data",c=>chunks.push(c)).on("end",()=>{
              const keys=JSON.parse(Buffer.concat(chunks).toString());
              const k=keys.find(k=>k.name==="service_role"||k.id==="service_role"||k.type==="secret");
              if(!k||!k.api_key){console.error("service role key not found");process.exit(1);}
              console.log(k.api_key);
            });')
          echo "::add-mask::$service_key"
          echo "SUPABASE_SERVICE_ROLE_KEY=$service_key" >> "$GITHUB_ENV"

      - name: Seed GloWe dev data
        env:
          SUPABASE_URL: https://${{ secrets.SUPABASE_PROJECT_REF }}.supabase.co
          GLOWE_SEED_PASSWORD: ${{ secrets.GLOWE_SEED_PASSWORD }}
        run: node scripts/seed-glowe-dev.mjs
