name: CI — main release guard

# Automated production gates (no human reviewers). Enforces dev → main releases
# and blocks obviously destructive migration SQL before merge.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - '.github/workflows/ci-main-guard.yml'
      - 'scripts/check-migration-safety.mjs'

concurrency:
  group: ci-main-guard-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  release-source:
    name: release PR source is dev
    if: github.event_name == 'pull_request' && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Enforce dev → main
        if: github.head_ref != 'dev'
        env:
          # Branch names are attacker-controlled on fork PRs — never inline
          # ${{ github.head_ref }} into a script (actionlint `expression`).
          HEAD_REF: ${{ github.head_ref }}
        run: |
          echo "::error::Production releases must open a PR from branch \`dev\` into \`main\` (head: \`${HEAD_REF}\`)."
          exit 1
      - name: OK
        run: echo "Release source branch is dev."

  migration-safety:
    name: migration destructive-op scan
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Scan all migrations
        run: node scripts/check-migration-safety.mjs
