name: CI — required-checks drift

# Meta-guard: the SSOT required-status-check tables (ENVIRONMENTS.md "Dev merge
# gates", RELEASE_CHECKLIST.md "Merge gates") must reference jobs that actually
# exist in .github/workflows/**. Branch protection matches required checks by
# their exact display name; when an agent renames or splits a job, the old name
# silently stops gating and auto-merge proceeds ungated. This guard fails the
# moment a documented required check loses its matching job.
#
# Triggers on workflow OR table changes. Path-filtered → deliberately NOT a
# required check itself (a path-filtered required context hangs "Expected" on
# unrelated PRs).

on:
  pull_request:
    branches: [main, dev]
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - '.github/workflows/**'
      - 'docs/SSOT/ENVIRONMENTS.md'
      - 'docs/SSOT/RELEASE_CHECKLIST.md'
      - 'scripts/check-required-checks-drift.mjs'
  push:
    branches: [main, dev]
    paths:
      - '.github/workflows/**'
      - 'docs/SSOT/ENVIRONMENTS.md'
      - 'docs/SSOT/RELEASE_CHECKLIST.md'
      - 'scripts/check-required-checks-drift.mjs'

concurrency:
  group: ci-required-checks-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  required-checks-drift:
    name: required-checks drift
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - name: Verify SSOT required-check tables map to real workflow jobs
        run: node scripts/check-required-checks-drift.mjs
      - name: Run the guard's own unit tests
        run: node --test scripts/check-required-checks-drift.test.mjs
